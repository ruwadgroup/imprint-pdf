printWidth: 100
tabWidth: 2
useTabs: false
semi: true
singleQuote: true
trailingComma: all
arrowParens: always
endOfLine: lf
proseWrap: preserve
overrides:
  - files: "*.md"
    options:
      printWidth: 80
      proseWrap: always
  - files:
      - "*.yml"
      - "*.yaml"
    options:
      singleQuote: false
