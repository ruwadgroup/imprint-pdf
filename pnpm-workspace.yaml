packages:
  - packages/*
  - examples/*

# react-reconciler-18 is shipped via an npm alias inside @imprint-pdf/react so
# consumers on React 18 get zero-config onboarding. Its `react@^18` peer is
# only consulted when the consumer actually runs React 18 — in our workspace
# we develop on React 19, so widen the rule.
peerDependencyRules:
  allowedVersions:
    "react-reconciler-18>react": "^18.2.0 || ^19.0.0"

catalog:
  typescript: ^5.7.2
  tsup: ^8.3.5
  vitest: ^4.1.6
  "@vitest/coverage-v8": ^4.1.5
  "@types/node": ^20.19.41
  react: ^19.0.0
  react-dom: ^19.0.0
  "@types/react": ^19.0.0
  "@types/react-dom": ^19.0.0
  zod: ^4.0.0
  pdf-lib: 1.17.1
  fontkit: ^2.0.4
  "@pdf-lib/fontkit": ^1.1.1
  react-reconciler: ^0.33.0
  "@types/react-reconciler": ^0.33.0
  cac: ^6.7.14
  chokidar: ^4.0.3
  node-forge: ^1.3.1
  "@types/node-forge": ^1.3.11
  tsx: ^4.21.0
