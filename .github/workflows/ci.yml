name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }} / Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Skip the WASM packages (need a Rust + wasm-pack toolchain not on
      # the runners) and the examples (transitively pull @imprint/tailwind's
      # Node-only createRequire path into a browser bundle — separate bug).
      # Call turbo directly so --filter targets turbo, not package scripts.
      - run: pnpm exec turbo run build --filter='!@imprint/icu-wasm' --filter='!@imprint/taffy-wasm' --filter='!@imprint/example-*'

      - run: pnpm typecheck

      - run: pnpm lint

      - run: pnpm test:ci
