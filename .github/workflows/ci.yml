name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }} / Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/icu-wasm
            packages/taffy-wasm

      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: v0.13.1

      - run: pnpm install --frozen-lockfile

      # Examples transitively pull @imprint-pdf/tailwind's Node-only createRequire
      # path into a browser bundle — separate bug, skipped here.
      - run: pnpm exec turbo run build --filter='!@imprint-pdf/example-*'

      - run: pnpm typecheck

      - run: pnpm lint

      - run: pnpm test:ci
