name: Release

# Push to main:
#   - Any `.changeset/*.md` present  → opens/updates a "Version Packages" PR.
#   - No changesets, versions ahead of npm → runs `pnpm release` →
#     `changeset publish` → npm + GitHub Releases.
# Publishing auth uses npm Trusted Publishing (OIDC), not a long-lived token.
# `workflow_dispatch` lets you re-trigger from the UI when needed.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/icu-wasm
            packages/taffy-wasm

      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: v0.13.1

      - run: pnpm install --frozen-lockfile

      # No `NPM_TOKEN` step on purpose. Each `@imprint-pdf/*` package is
      # configured for npm's "Trusted Publishing": npm trusts this workflow's
      # GitHub Actions OIDC token to publish, no long-lived secret needed.
      # `setup-node` above writes a registry-pointed `.npmrc`, the
      # `id-token: write` permission on this job grants the OIDC token, and
      # `NPM_CONFIG_PROVENANCE: true` makes the npm CLI fetch & use it.
      - name: Create Release Pull Request or Publish
        uses: changesets/action@v1
        with:
          publish: pnpm release
          title: "chore: version packages"
          commit: "chore: version packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
