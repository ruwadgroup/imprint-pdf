name: Release

# Two-stage flow:
#   1. Push to main → action reads `.changeset/*.md` and opens (or updates)
#      a "Version Packages" PR. Nothing is published yet.
#   2. You merge that PR → no remaining changesets, action runs
#      `changeset publish` to push tags + npm releases + GitHub Releases.
# `workflow_dispatch` is kept so you can re-trigger from the UI if needed.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/icu-wasm
            packages/taffy-wasm

      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: v0.13.1

      - run: pnpm install --frozen-lockfile

      # `setup-node` writes a userconfig at $RUNNER_TEMP/.npmrc and sets
      # NPM_CONFIG_USERCONFIG to point at it. `npm config set --location=user`
      # writes to that same file (rather than $HOME/.npmrc, which npm ignores
      # when NPM_CONFIG_USERCONFIG is set).
      - name: Configure npm auth
        run: npm config set //registry.npmjs.org/:_authToken="${NPM_TOKEN}" --location=user
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Release Pull Request or Publish
        uses: changesets/action@v1
        with:
          publish: pnpm release
          title: "chore: version packages"
          commit: "chore: version packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
