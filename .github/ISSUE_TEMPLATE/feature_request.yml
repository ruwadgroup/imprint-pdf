name: Feature request
description: Propose a new capability
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case, not the solution.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed API / behaviour
      description: Show code where possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you considered
